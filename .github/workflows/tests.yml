name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-backend:
    name: Lint — backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=backend

  lint-frontend:
    name: Lint — frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=frontend
      - run: npm run lint:scss --workspace=frontend

  lint-sdk:
    name: Lint — sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=sdk

  lint-agent:
    name: Lint — agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=agent

  lint-mcp:
    name: Lint — mcp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=mcp

  test-backend:
    name: Test — backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test --workspace=backend

  test-frontend:
    name: Test — frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test --workspace=frontend

  cypress:
    name: E2E — cypress
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, lint-sdk, lint-agent, lint-mcp, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build backend
        run: npm run build --workspace=backend
      - name: Start backend
        run: npm run start --workspace=backend &
      - name: Start frontend
        run: npm run dev --workspace=frontend &
      - name: Wait for servers
        run: npx wait-on http://localhost:3000/alive http://localhost:5173 --timeout 30000
      - name: Run Cypress
        run: npm run cypress:run --workspace=frontend
